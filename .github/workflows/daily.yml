name: Daily Post Generator

on:
  schedule:
    - cron: "0 0 * * *"  # 毎日9時(JST)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate post
        run: python generate.py

      - name: Commit & Push
        run: |
          git config user.name "auto-bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "auto post" || exit 0
          git push
