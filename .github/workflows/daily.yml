name: Daily Post Generator

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "$HOME/.ollama/bin" >> $GITHUB_PATH

      - name: Verify Ollama
        run: |
          which ollama || true
          ollama --version || true

      - name: Start Ollama server
        run: |
          ollama serve &
          sleep 5

      - name: Pull model
        run: |
          ollama pull mistral

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate post
        run: python generate.py

      - name: Commit & Push
        run: |
          git config user.name "auto-bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "auto post" || exit 0
          git push
